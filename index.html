<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VoiceList">
  <title>Voice List</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --border:   #2a2a2a;
      --border2:  #333;
      --text:     #f0ede8;
      --muted:    #666;
      --muted2:   #444;
      --accent:   #e8ff5a;
      --accent2:  #c8df3a;
      --red:      #ff4d4d;
      --red-dim:  rgba(255,77,77,0.15);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-top: var(--safe-top);
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
    }


    .header-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .app-name {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .item-count {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .clear-done-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 5px 12px;
      cursor: pointer;
      transition: color .15s, border-color .15s, opacity .15s;
      visibility: hidden;
      opacity: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .clear-done-btn.visible { visibility: visible; opacity: 1; }
    .clear-done-btn:active { color: var(--text); border-color: var(--muted); }

    /* ── List area ── */
    .list-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px 0;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--muted2);
      pointer-events: none;
    }

    .empty-state svg { opacity: 0.55; }
    .empty-state p { font-size: 13px; font-family: 'DM Mono', monospace; }
    .empty-sub { font-size: 12px !important; color: var(--muted2) !important; margin-top: -4px; }

    /* ── List items ── */
    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }

    .list-item.new-item {
      animation: slide-in .15s ease-out;
    }

    @keyframes slide-in {
      from { transform: translateY(5px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }

    .list-item.done { opacity: 0.4; }

    .item-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid #e8ff5a;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: background .15s, border-color .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }

    .item-check:active { transform: scale(0.85); }

    .list-item.done .item-check {
      background: #e8ff5a;
      border-color: #e8ff5a;
    }

    .item-check svg { display: none; width: 11px; height: 11px; }
    .list-item.done .item-check svg { display: block; }

    .item-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.55;
      color: var(--text);
      word-break: break-word;
      cursor: pointer;
      padding: 1px 0;
      -webkit-tap-highlight-color: transparent;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-text.expanded {
      display: block;
      overflow: visible;
    }

    .item-expand {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      background: none;
      border: none;
      padding: 2px 0 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: none;
    }

    .item-expand.visible { display: block; }

    .list-item.done .item-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .item-delete {
      width: 34px;
      height: 34px;
      border: 1.5px solid #3a3a3a;
      background: #222;
      color: #888;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color .15s, background .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .item-delete:active { color: var(--red); background: var(--red-dim); border-color: var(--red); }

    /* Inline edit */
    .list-item.editing .item-text { display: none; }
    .list-item.editing .item-expand { display: none; }
    .item-edit-input {
      flex: 1;
      background: #1a1a1a;
      border: 1.5px solid #e8ff5a;
      border-radius: 8px;
      padding: 6px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      caret-color: #e8ff5a;
      display: none;
    }
    .list-item.editing .item-edit-input { display: block; }
    .item-edit-actions {
      display: none;
      gap: 6px;
      flex-shrink: 0;
    }
    .list-item.editing .item-edit-actions { display: flex; }
    .list-item.editing .item-delete { display: none; }
    .list-item.editing .item-check { display: none; }
    .edit-confirm, .edit-cancel {
      height: 34px;
      padding: 0 12px;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }
    .edit-confirm { background: #e8ff5a; color: #0f0f0f; }
    .edit-cancel  { background: #222; color: var(--muted); border: 1.5px solid #333; }

    /* ── Bottom input bar ── */
    .input-bar {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding: 10px 12px;
      padding-bottom: calc(10px + var(--safe-bot));
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    /* Live preview strip shown above input row while recording */
    .transcript-preview {
      font-size: 13px;
      color: #999;
      line-height: 1.4;
      padding: 0 2px 8px 10px;
      border-left: 2px solid var(--red);
      display: none;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .transcript-preview.visible { display: block; }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Mic button — same size as add-btn */
    .mic-btn {
      height: 46px;
      padding: 0 16px;
      border-radius: 10px;
      border: 2px solid #e8ff5a;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      transition: background .15s, border-color .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }

    .mic-btn:active { transform: scale(0.91); }

    .mic-btn.recording {
      background: var(--red-dim);
      border-color: var(--red);
    }

    .mic-btn.disabled { opacity: 0.3; cursor: not-allowed; }

    .mic-btn svg {
      width: 18px;
      height: 18px;
    }

    .mic-btn svg .mic-icon { stroke: #e8ff5a; fill: none; }
    .mic-btn.recording svg .mic-icon { stroke: var(--red); }

    /* Recording indicator dot */
    .mic-btn::after {
      content: '';
      position: absolute;
      top: 6px;
      right: 6px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      opacity: 0;
      transition: opacity .2s;
    }

    .mic-btn.recording::after {
      opacity: 1;
      animation: blink .9s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    .text-input {
      flex: 1;
      height: 46px;
      background: var(--surface);
      border: 1.5px solid var(--border2);
      border-radius: 10px;
      padding: 0 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
      caret-color: var(--accent);
    }

    .text-input::placeholder { color: var(--muted2); }
    .text-input:focus { border-color: var(--accent2); }

    .add-btn {
      height: 46px;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, transform .1s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .add-btn:active { transform: scale(0.93); background: var(--accent2); }

    .error-msg {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--red);
      padding: 6px 2px 0;
      display: none;
      line-height: 1.4;
    }

    .error-msg.visible { display: block; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(80px + var(--safe-bot));
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #242424;
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      padding: 8px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity .18s, transform .18s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <span class="app-name">voicelist</span>
      <span style="font-size:10px;color:#333;font-family:monospace;">v14</span>
      <span class="item-count" id="item-count"></span>
    </div>
    <button class="clear-done-btn" id="clear-done-btn" onclick="clearDone()">clear done</button>
  </header>

  <!-- List fills the screen -->
  <div class="list-area" id="list-area">
    <div class="empty-state" id="empty-state">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
      </svg>
      <p>no items yet</p>
      <p class="empty-sub">tap the mic or type to add</p>
    </div>
  </div>

  <!-- Input bar pinned to bottom -->
  <div class="input-bar">
    <div class="transcript-preview" id="transcript-preview"></div>
    <div class="input-row">
      <input
        class="text-input"
        id="text-input"
        type="text"
        placeholder="Type or paste…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        onkeydown="handleKey(event)"
      >
      <button class="add-btn" onclick="addFromInput()">add</button>
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()" aria-label="Toggle voice input">
        <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect class="mic-icon" x="9" y="2" width="6" height="11" rx="3"/>
          <path class="mic-icon" d="M5 10a7 7 0 0 0 14 0"/>
          <line class="mic-icon" x1="12" y1="17" x2="12" y2="21"/>
          <line class="mic-icon" x1="8" y1="21" x2="16" y2="21"/>
        </svg>
      </button>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── State ──────────────────────────────────────────────
    const STORAGE_KEY = 'voicelist_items';
    let items = [];
    let recording = false;
    let recognition = null;
    let restartCount = 0;
    const MAX_RESTARTS = 5;
    let finalTranscript = '';
    let committedIndex = 0;  // tracks which result indices already committed

    // ── Persistence ────────────────────────────────────────
    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        items = raw ? JSON.parse(raw) : [];
      } catch(e) { items = []; }
    }

    function save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      } catch(e) { showToast('storage full'); }
    }

    // ── Parsing ────────────────────────────────────────────
    // Spoken connectors — order matters (longer first)
    const SPOKEN_SPLITS = [
      'and then', 'and also', 'after that', 'next up', 'and next',
      'first of all', 'secondly', 'thirdly', 'also', 'finally', 'next',
    ];
    const ORDINAL_PREFIX = /^(first|second|third|fourth|fifth|one|two|three|four|five)[,:;\s]+/i;
    const FILLERS = /^(umm*h?|uhh*|so|like|okay|ok|right|well|i mean)[,.\s]+/i;

    function parseText(raw) {
      let text = raw;
      // Replace spoken connector phrases (surrounded by whitespace) with newlines
      SPOKEN_SPLITS.forEach(function(sep) {
        var escaped = sep.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        text = text.replace(new RegExp('\\s+' + escaped + '\\s+', 'gi'), '\n');
        // Also handle at start of string
        text = text.replace(new RegExp('^' + escaped + '\\s+', 'gi'), '');
      });
      // Split on sentence-ending punctuation before a capital letter
      text = text.replace(/([.!?])\s+(?=[A-Z])/g, '$1\n');
      // Split on commas — handles "milk, eggs, bread" style lists.
      // Strip leading "and"/"or" from each segment so "walnuts, and noodles"
      // doesn't produce an item called "and noodles".
      text = text.replace(/,\s*/g, '\n');
      // Split on standalone "and" between items
      text = text.replace(/\s+and\s+/gi, '\n');
      return text
        .split('\n')
        .map(function(s) {
          // Strip leading "and" / "or" left over from comma lists
          var clean = s.replace(/^(and|or)\s+/i, '').trim();
          // Strip fillers and ordinals repeatedly (e.g. "um so first, ...")
          var prev;
          do { prev = clean; clean = clean.replace(FILLERS, '').replace(ORDINAL_PREFIX, '').trim(); } while (clean !== prev);
          return clean.replace(/[.!?,]+$/, '').trim();
        })
        .filter(function(s) { return s.length > 2; })
        .map(function(s) { return s.charAt(0).toUpperCase() + s.slice(1); });
    }

    // ── Items ──────────────────────────────────────────────
    const MAX_ITEMS = 500;

    function addItems(texts) {
      const parsed = texts.flatMap(parseText);
      if (!parsed.length) return;
      if (items.length >= MAX_ITEMS) {
        showToast('list full — clear some items first (500 max)');
        return;
      }
      // If adding would exceed cap, trim to fit
      const slots = MAX_ITEMS - items.length;
      const allowed = parsed.slice(0, slots);
      if (allowed.length < parsed.length) {
        showToast('list full — only ' + allowed.length + ' of ' + parsed.length + ' items added');
      }
      const newItems = allowed.map(text => ({
        id: Date.now() + '-' + Math.random().toString(36).slice(2),
        text,
        done: false
      }));
      items = [...items, ...newItems];
      save();
      render();
      if (allowed.length === parsed.length) {
        showToast(allowed.length === 1 ? '1 item added' : allowed.length + ' items added');
      }
      scrollToBottom();
    }

    function toggleDone(id) {
      const item = items.find(i => i.id === id);
      if (item) { item.done = !item.done; save(); render(); }
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.done);
      save();
      render();
      showToast('done items cleared');
    }

    function scrollToBottom() {
      const area = document.getElementById('list-area');
      requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
    }

    // ── Render ─────────────────────────────────────────────
    function render() {
      const area     = document.getElementById('list-area');
      const empty    = document.getElementById('empty-state');
      const countEl  = document.getElementById('item-count');
      const clearBtn = document.getElementById('clear-done-btn');

      const activeCount = items.filter(i => !i.done).length;
      const doneCount   = items.filter(i => i.done).length;

      countEl.textContent = activeCount
        ? activeCount + ' to do'
        : (items.length ? 'all done ✓' : '');
      clearBtn.classList.toggle('visible', doneCount > 0);

      // empty-state is the first child of list-area; never gets wiped
      empty.style.display = items.length ? 'none' : '';

      // Map existing item rows by id
      const existing = new Map();
      area.querySelectorAll('.list-item').forEach(el => existing.set(el.dataset.id, el));

      if (!items.length) {
        existing.forEach(el => el.remove());
        return;
      }

      // Rebuild fragment in correct order, reusing DOM nodes where possible
      const fragment = document.createDocumentFragment();
      items.forEach(item => {
        let el = existing.get(item.id);
        if (el) {
          el.classList.toggle('done', item.done);
          existing.delete(item.id);
        } else {
          el = makeItemEl(item);
        }
        fragment.appendChild(el);
      });

      // Remove stale rows
      existing.forEach(el => el.remove());

      // Append after the empty-state node
      area.appendChild(fragment);
    }

    function makeItemEl(item) {
      const div = document.createElement('div');
      div.className = 'list-item new-item' + (item.done ? ' done' : '');
      // Remove animation class after it plays so re-renders don't re-trigger it
      div.addEventListener('animationend', () => div.classList.remove('new-item'), { once: true });
      div.dataset.id = item.id;
      div.style.flexWrap = 'wrap';

      div.innerHTML = `
        <div class="item-check" onclick="toggleDone('${item.id}')">
          <svg viewBox="0 0 12 12" fill="none" stroke="#0f0f0f" stroke-width="2.2" stroke-linecap="round">
            <polyline points="1.5,6 4.5,9 10.5,3"/>
          </svg>
        </div>
        <div class="item-text" onclick="toggleDone('${item.id}')">${escHtml(item.text)}</div>
        <input class="item-edit-input" type="text" value="${escHtml(item.text)}" />
        <div class="item-edit-actions">
          <button class="edit-confirm">save</button>
          <button class="edit-cancel">cancel</button>
        </div>
        <button class="item-expand">show more</button>
        <button class="item-delete" onclick="deleteItem('${item.id}')" aria-label="Delete">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="3" y1="3" x2="11" y2="11"/>
            <line x1="11" y1="3" x2="3" y2="11"/>
          </svg>
        </button>
      `;

      // Show/hide "show more" based on whether text is actually clamped
      const textEl = div.querySelector('.item-text');
      const expandBtn = div.querySelector('.item-expand');
      requestAnimationFrame(() => {
        if (textEl.scrollHeight > textEl.clientHeight + 2) {
          expandBtn.classList.add('visible');
        }
      });

      expandBtn.addEventListener('click', () => {
        const expanded = textEl.classList.toggle('expanded');
        expandBtn.textContent = expanded ? 'show less' : 'show more';
      });

      // Double-tap to edit — suppress on delete and expand buttons
      let lastTap = 0;
      div.addEventListener('pointerdown', (e) => {
        // Don't trigger edit if tapping the delete or expand button
        if (e.target.closest('.item-delete') || e.target.closest('.item-expand')) return;
        const now = Date.now();
        if (now - lastTap < 350) {
          beginEdit(div, item.id);
          lastTap = 0;
        } else {
          lastTap = now;
        }
      });

      // Edit confirm / cancel
      const editInput = div.querySelector('.item-edit-input');
      div.querySelector('.edit-confirm').addEventListener('click', () => commitEdit(div, item.id, editInput.value));
      div.querySelector('.edit-cancel').addEventListener('click', () => cancelEdit(div));
      editInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); commitEdit(div, item.id, editInput.value); }
        if (e.key === 'Escape') cancelEdit(div);
      });

      return div;
    }

    function beginEdit(div, id) {
      div.classList.add('editing');
      const input = div.querySelector('.item-edit-input');
      input.focus();
      input.select();
    }

    function cancelEdit(div) {
      div.classList.remove('editing');
    }

    function commitEdit(div, id, newText) {
      const trimmed = newText.trim();
      if (!trimmed) return;
      const item = items.find(i => i.id === id);
      if (item) {
        item.text = trimmed;
        save();
      }
      div.classList.remove('editing');
      // Update the visible text and edit input value
      div.querySelector('.item-text').textContent = trimmed;
      div.querySelector('.item-edit-input').value = trimmed;
      // Re-check if truncation is needed
      const textEl = div.querySelector('.item-text');
      textEl.classList.remove('expanded');
      const expandBtn = div.querySelector('.item-expand');
      expandBtn.textContent = 'show more';
      requestAnimationFrame(() => {
        expandBtn.classList.toggle('visible', textEl.scrollHeight > textEl.clientHeight + 2);
      });
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Manual input ───────────────────────────────────────
    function addFromInput() {
      const el = document.getElementById('text-input');
      const val = el.value.trim();
      if (!val) return;
      addItems([val]);
      el.value = '';
    }

    function handleKey(e) {
      if (e.key === 'Enter') { e.preventDefault(); addFromInput(); }
    }

    // ── Speech recognition ─────────────────────────────────
    const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

    function initSpeech() {
      if (!SpeechAPI) {
        document.getElementById('mic-btn').classList.add('disabled');
        document.getElementById('mic-btn').onclick = null;
        showError('voice input not supported in this browser — text input still works');
        return;
      }

      recognition = new SpeechAPI();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = navigator.language || 'en-AU';
      recognition.maxAlternatives = 1;

      // Chrome Android fires multiple final results for the same utterance as
      // it refines confidence. We use two guards:
      //   1. committedChunks — exact-match dedup across the session
      //   2. lockUntil — time-window lock so revisions (e.g. "skim" -> "skim milk")
      //      within 1.2s of a commit are ignored unless clearly new content
      let committedChunks = new Set();
      let lastCommitTime = 0;
      let lastCommitKey = '';
      let isRestart = false;
      let firstResultTimer = null;
      let pendingFirstChunk = null;

      recognition.onstart = () => {
        if (!isRestart) {
          finalTranscript = '';
          committedIndex = 0;
          committedChunks = new Set();
          lastCommitTime = 0;
          lastCommitKey = '';
          restartCount = 0;
          pendingFirstChunk = null;
          if (firstResultTimer) { clearTimeout(firstResultTimer); firstResultTimer = null; }
        }
        isRestart = false;
        setRecording(true);
        setPreview('Listening…');
      };

      recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            let chunk = e.results[i][0].transcript.trim();
            if (!chunk) continue;
            // Strip trailing orphan conjunctions Chrome emits alone
            chunk = chunk.replace(/\s*(\band\b|\bor\b|\bthe\b)\s*$/i, '').trim();
            if (chunk.length < 2) continue;

            const key = chunk.toLowerCase().replace(/\s+/g, ' ');
            const now = Date.now();

            // Exact duplicate — always skip
            if (committedChunks.has(key)) continue;

            // Within the lock window — skip if this looks like a revision of
            // the last commit (last key is a prefix of new key, or vice versa)
            if (now - lastCommitTime < 1200) {
              const isRevision = key.startsWith(lastCommitKey) || lastCommitKey.startsWith(key);
              if (isRevision) continue;
            }

            // Hold the first result for 800ms — Chrome often revises it.
            // If a revision arrives within that window, restart the timer.
            // If something genuinely new arrives, flush the pending first chunk first.
            if (!finalTranscript && pendingFirstChunk === null) {
              pendingFirstChunk = { chunk, key };
              firstResultTimer = setTimeout(() => {
                if (pendingFirstChunk) {
                  const p = pendingFirstChunk; pendingFirstChunk = null;
                  committedChunks.add(p.key); lastCommitTime = Date.now(); lastCommitKey = p.key;
                  finalTranscript += p.chunk + ' '; addItems([p.chunk]);
                }
              }, 800);
              continue;
            }
            if (pendingFirstChunk !== null) {
              const isRevision = key.startsWith(pendingFirstChunk.key) || pendingFirstChunk.key.startsWith(key);
              if (isRevision) {
                clearTimeout(firstResultTimer);
                pendingFirstChunk = { chunk, key };
                firstResultTimer = setTimeout(() => {
                  if (pendingFirstChunk) {
                    const p = pendingFirstChunk; pendingFirstChunk = null;
                    committedChunks.add(p.key); lastCommitTime = Date.now(); lastCommitKey = p.key;
                    finalTranscript += p.chunk + ' '; addItems([p.chunk]);
                  }
                }, 800);
                continue;
              } else {
                clearTimeout(firstResultTimer);
                const p = pendingFirstChunk; pendingFirstChunk = null;
                committedChunks.add(p.key); lastCommitTime = Date.now(); lastCommitKey = p.key;
                finalTranscript += p.chunk + ' '; addItems([p.chunk]);
              }
            }
            committedChunks.add(key);
            lastCommitTime = now; lastCommitKey = key;
            finalTranscript += chunk + ' '; addItems([chunk]);
          } else {
            interim = e.results[i][0].transcript;
          }
        }
        setPreview(interim || (finalTranscript ? '✓ ' + finalTranscript.trim() : 'Listening…'));
      };

      recognition.onerror = (e) => {
        if (e.error === 'not-allowed') {
          // Most common cause: HTTP instead of HTTPS
          showError('mic blocked — needs HTTPS to work. deploy via Netlify (see README).');
          stopRecording(false);
        } else if (e.error === 'network') {
          showError('network required for voice recognition');
          stopRecording(false);
        }
        // 'no-speech' is normal — Chrome stops on silence, onend restarts
      };

      recognition.onend = () => {
        if (recording) {
          if (restartCount < MAX_RESTARTS) {
            restartCount++;
            isRestart = true;
            try { recognition.start(); } catch(_) {}
          } else {
            commitTranscript();
            stopRecording(false);
          }
        } else {
          commitTranscript();
        }
      };
    }

    function toggleMic() {
      if (!SpeechAPI) return;
      recording ? stopRecording(true) : startRecording();
    }

    function startRecording() {
      clearError();
      // isRestart=false so onstart treats this as a fresh session
      try { recognition.start(); } catch(e) { showError('could not start mic'); }
    }

    function stopRecording(manual) {
      setRecording(false);
      if (manual) { try { recognition.stop(); } catch(_) {} }
    }

    function commitTranscript() {
      // Items are already committed chunk-by-chunk in onresult.
      // Just clear the preview and reset the transcript buffer.
      finalTranscript = '';
      setPreview('');
    }

    function setRecording(on) {
      recording = on;
      document.getElementById('mic-btn').classList.toggle('recording', on);
    }

    function setPreview(text) {
      const el = document.getElementById('transcript-preview');
      el.textContent = text;
      el.classList.toggle('visible', !!text);
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function clearError() {
      document.getElementById('error-msg').classList.remove('visible');
    }

    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    load();
    render();
    initSpeech();
  </script>
</body>
</html>
